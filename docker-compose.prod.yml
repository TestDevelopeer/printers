name: asp-printers

services:
  app:
    image: asp-printers:latest
    env_file:
      - .env.server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/html/storage

  worker:
    image: asp-printers:latest
    env_file:
      - .env.server
    command: ["worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/html/storage

  scheduler:
    image: asp-printers:latest
    env_file:
      - .env.server
    command: ["scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/html/storage

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - app
    ports:
      - "127.0.0.1:1265:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-asp_printers}
      POSTGRES_USER: ${DB_USERNAME:-asp_printers}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-asp_printers}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-asp_printers} -d ${DB_DATABASE:-asp_printers}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
    name: asp-printers_postgres_data
  redis_data:
    name: asp-printers_redis_data
