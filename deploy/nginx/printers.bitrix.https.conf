server {
    listen 80;
    server_name printer.xn--80a4af.xn--p1ai;

    access_log /var/log/nginx/printers_access.log main;
    error_log /var/log/nginx/printers_error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/dehydrated/;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name printer.xn--80a4af.xn--p1ai;

    access_log /var/log/nginx/printers_ssl_access.log main;
    error_log /var/log/nginx/printers_ssl_error.log warn;

    include bx/conf/ssl_options.conf;
    ssl_certificate /etc/nginx/ssl/printer.xn--80a4af.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/printer.xn--80a4af.xn--p1ai/privkey.pem;
    ssl_trusted_certificate /etc/nginx/ssl/printer.xn--80a4af.xn--p1ai/chain.pem;

    proxy_set_header HTTPS YES;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/dehydrated/;
        default_type "text/plain";
    }

    location / {
        proxy_pass http://127.0.0.1:1265;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
